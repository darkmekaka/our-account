<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>쑥잠이네 가계부</title>
    <style>
        body { font-family: 'Malgun Gothic', sans-serif; background-color: #f5f7fa; margin: 0; padding: 0; display: flex; justify-content: center; }
        .app-container { width: 100%; max-width: 480px; background-color: #ffffff; min-height: 100vh; box-shadow: 0 0 20px rgba(0,0,0,0.05); display: flex; flex-direction: column; }
        
        /* 헤더 */
        .header { background-color: #1e293b; color: white; padding: 25px 20px; border-bottom-left-radius: 24px; border-bottom-right-radius: 24px; }
        .header h1 { margin: 0 0 10px 0; font-size: 16px; opacity: 0.8; font-weight: normal; text-align: center; }
        .balance-box { margin-bottom: 20px; text-align: right; }
        .balance-box .label { font-size: 13px; opacity: 0.7; }
        .balance-box .amount { font-size: 30px; font-weight: bold; }
        
        /* 수입/지출 좌우 배치 */
        .summary-row { display: flex; border-top: 1px solid rgba(255,255,255,0.1); padding-top: 15px; }
        .summary-item { flex: 1; text-align: center; }
        .summary-item.income { border-right: 1px solid rgba(255,255,255,0.1); }
        .summary-item .title { font-size: 12px; opacity: 0.7; margin-bottom: 4px; }
        .summary-item .val { font-size: 16px; font-weight: bold; }
        .summary-item.income .val { color: #4ade80; }
        .summary-item.expense .val { color: #f87171; }
        
        /* 입력 및 리스트 */
        .input-section { padding: 20px; border-bottom: 8px solid #f5f7fa; }
        .type-selector { display: flex; gap: 10px; margin-bottom: 12px; }
        .type-btn { flex: 1; padding: 12px; border: 1px solid #e2e8f0; border-radius: 8px; text-align: center; font-size: 14px; font-weight: bold; cursor: pointer; background-color: #f8fafc; color: #64748b; }
        .type-btn.active.husband { background-color: #e0f2fe; color: #0369a1; border-color: #0369a1; }
        .type-btn.active.wife { background-color: #fce7f3; color: #be185d; border-color: #be185d; }
        .type-btn.active.income { background-color: #e8f5e9; color: #2e7d32; border-color: #2e7d32; }
        .type-btn.active.expense { background-color: #ffebee; color: #c62828; border-color: #c62828; }
        
        .input-row { display: flex; gap: 8px; margin-bottom: 12px; }
        input, select { padding: 12px; border: 1px solid #e2e8f0; border-radius: 8px; font-size: 15px; background-color: #f8fafc; box-sizing: border-box; }
        .input-row input { flex: 1; min-width: 0; }
        .input-row select { width: 35%; max-width: 120px; flex-shrink: 0; }
        .submit-btn { width: 100%; padding: 14px; background-color: #1e293b; color: white; border: none; border-radius: 8px; font-size: 16px; font-weight: bold; cursor: pointer; }
        
        .ledger-item { display: flex; justify-content: space-between; align-items: center; padding: 14px 10px; border-bottom: 1px solid #f1f5f9; cursor: pointer; }
        .user-badge { padding: 3px 6px; border-radius: 4px; font-size: 11px; margin-right: 8px; }
        .user-badge.husband { background-color: #e0f2fe; color: #0369a1; }
        .user-badge.wife { background-color: #fce7f3; color: #be185d; }
        .item-amount.income { color: #2e7d32; }
        .item-amount.expense { color: #c62828; }
        
        /* 모달 */
        .modal-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); justify-content: center; align-items: center; z-index: 100; }
        .modal-content { background: white; padding: 20px; border-radius: 16px; width: 85%; max-width: 380px; }
        .modal-buttons { display: flex; gap: 10px; margin-top: 15px; }
        .modal-btn { flex: 1; padding: 12px; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>

<div class="app-container">
    <div class="header">
        <h1>쑥잠이네 가계부</h1>
        <div class="balance-box">
            <div class="label">이번 달 정산 잔액</div>
            <div class="amount" id="db-balance">0 원</div>
        </div>
        <div class="summary-row">
            <div class="summary-item income">
                <div class="title">총 수입</div>
                <div class="val" id="db-income">+ 0원</div>
            </div>
            <div class="summary-item expense">
                <div class="title">총 지출</div>
                <div class="val" id="db-expense">- 0원</div>
            </div>
        </div>
    </div>
    
    <div class="input-section">
        <div class="type-selector">
            <div class="type-btn husband active" id="btn-user-husband" onclick="changeUser('남편')">남편</div>
            <div class="type-btn wife" id="btn-user-wife" onclick="changeUser('아내')">아내</div>
        </div>
        <div class="type-selector">
            <div class="type-btn income" id="btn-inc" onclick="selectType('income')">수입</div>
            <div class="type-btn expense active" id="btn-exp" onclick="selectType('expense')">지출</div>
        </div>
        <div class="input-row">
            <input type="number" id="amount" placeholder="금액 (원)">
            <select id="card">
                <option value="현금/계좌">현금/계좌</option><option value="현대카드">현대카드</option><option value="bc카드">bc카드</option><option value="국민카드">국민카드</option><option value="신한카드">신한카드</option><option value="삼성카드">삼성카드</option><option value="롯데카드">롯데카드</option><option value="NH카드">NH카드</option>
            </select>
        </div>
        <input type="text" id="title" placeholder="사용 내역" style="width: 100%; padding: 12px; box-sizing: border-box; margin-bottom: 12px;">
        <button class="submit-btn" onclick="addItem()">가계부 등록하기</button>
    </div>

    <div class="list-section">
        <ul class="ledger-list" id="ledger-list"></ul>
    </div>
</div>

<div class="modal-overlay" id="edit-modal">
    <div class="modal-content">
        <input type="number" id="modal-amount" style="width:100%; padding:12px; box-sizing:border-box; margin-bottom:10px;">
        <input type="text" id="modal-title" style="width:100%; padding:12px; box-sizing:border-box;">
        <div class="modal-buttons">
            <button class="modal-btn" style="background:#ef4444; color:white;" onclick="deleteItem()">삭제</button>
            <button class="modal-btn" style="background:#e2e8f0;" onclick="closeModal()">취소</button>
            <button class="modal-btn" style="background:#1e293b; color:white;" onclick="updateItem()">수정</button>
        </div>
    </div>
</div>

<script>
    const googleWebAppsUrl = "https://script.google.com/macros/s/AKfycbxucl6WBycngDBXGEorfn_ueclPlvMaEl9jZo2SqefsHTnFEPJj-QoVWLau_riTXWNV/exec";
    let ledgerItems = [], selectedUser = '남편', selectedType = 'expense', currentId = null;

    function changeUser(u) { selectedUser = u; document.getElementById('btn-user-husband').classList.toggle('active', u==='남편'); document.getElementById('btn-user-wife').classList.toggle('active', u==='아내'); }
    function selectType(t) { selectedType = t; document.getElementById('btn-inc').classList.toggle('active', t==='income'); document.getElementById('btn-exp').classList.toggle('active', t==='expense'); document.getElementById('card').disabled = (t==='income'); }
    function addItem() {
        const d = {action:'add', id:Date.now(), type:selectedType==='income'?'수입':'지출', user:selectedUser, title:document.getElementById('title').value, amount:parseInt(document.getElementById('amount').value), card:document.getElementById('card').value};
        fetch(googleWebAppsUrl, {method:'POST', body:JSON.stringify(d)}).then(()=>location.reload());
    }
    function openModal(id) { currentId = id; const item = ledgerItems.find(i=>i.id===id); document.getElementById('modal-amount').value = item.amount; document.getElementById('modal-title').value = item.title; document.getElementById('edit-modal').style.display = 'flex'; }
    function closeModal() { document.getElementById('edit-modal').style.display = 'none'; }
    function updateItem() { const d = {action:'update', id:currentId, title:document.getElementById('modal-title').value, amount:parseInt(document.getElementById('modal-amount').value)}; fetch(googleWebAppsUrl, {method:'POST', body:JSON.stringify(d)}).then(()=>location.reload()); }
    function deleteItem() { fetch(googleWebAppsUrl, {method:'POST', body:JSON.stringify({action:'delete', id:currentId})}).then(()=>location.reload()); }
    function render() {
        const list = document.getElementById('ledger-list'); list.innerHTML = ''; let inc=0, exp=0;
        [...ledgerItems].reverse().forEach(i => {
            if(i.type==='수입') inc+=i.amount; else exp+=i.amount;
            list.innerHTML += `<li class="ledger-item" onclick="openModal(${i.id})"><div><span class="user-badge ${i.user==='남편'?'husband':'wife'}">${i.user}</span>${i.title}</div><div class="item-amount ${i.type==='수입'?'income':'expense'}">${i.amount.toLocaleString()}원</div></li>`;
        });
        document.getElementById('db-balance').innerText = (inc-exp).toLocaleString() + ' 원';
        document.getElementById('db-income').innerText = `+ ${inc.toLocaleString()}원`;
        document.getElementById('db-expense').innerText = `- ${exp.toLocaleString()}원`;
    }
    fetch(googleWebAppsUrl).then(r=>r.json()).then(d=>{ledgerItems=d; render();});
</script>
</body>
</html>
