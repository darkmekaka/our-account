<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>우리집 실시간 가계부</title>
    <style>
        body { font-family: 'Malgun Gothic', sans-serif; background-color: #f5f7fa; margin: 0; padding: 0; display: flex; justify-content: center; }
        .app-container { width: 100%; max-width: 480px; background-color: #ffffff; min-height: 100vh; box-shadow: 0 0 20px rgba(0,0,0,0.05); display: flex; flex-direction: column; position: relative; }
        
        /* 대시보드 상단 */
        .header { background-color: #1e293b; color: white; padding: 25px 20px; border-bottom-left-radius: 24px; border-bottom-right-radius: 24px; }
        .header h1 { margin: 0 0 10px 0; font-size: 23px; font-weight: bold; text-align: center; }
        
        /* 구글 시트 및 토글 버튼 스타일 */
        .sheet-btn { display: block; text-align: center; background: rgba(255,255,255,0.1); color: #cbd5e1; padding: 6px; border-radius: 6px; text-decoration: none; font-size: 12px; margin-bottom: 15px; }
        .sheet-btn:hover { background: rgba(255,255,255,0.2); color: #ffffff; }

        .balance-box { margin-top: 10px; margin-bottom: 20px; text-align: right; }
        .balance-box .label { font-size: 13px; opacity: 0.7; }
        .balance-box .amount { font-size: 30px; font-weight: bold; }
        .summary-row { display: flex; gap: 15px; border-top: 1px solid rgba(255,255,255,0.1); padding-top: 15px; }
        .summary-item { flex: 1; }
        .summary-item .title { font-size: 12px; opacity: 0.7; margin-bottom: 4px; }
        .summary-item .val { font-size: 16px; font-weight: bold; }
        .summary-item.income .val { color: #4ade80; }
        .summary-item.expense .val { color: #f87171; }
        
        /* 입력 섹션 */
        .input-section { padding: 20px; border-bottom: 8px solid #f5f7fa; }
        .type-selector { display: flex; gap: 10px; margin-bottom: 12px; }
        .type-btn { flex: 1; padding: 12px; border: 1px solid #e2e8f0; border-radius: 8px; text-align: center; font-size: 14px; font-weight: bold; cursor: pointer; background-color: #f8fafc; color: #64748b; transition: all 0.2s; user-select: none; -webkit-user-select: none; }
        
        /* 필터 배경색 고정 */
        .type-btn.active.husband { background-color: #e0f2fe !important; color: #0369a1 !important; border-color: #0369a1 !important; }
        .type-btn.active.wife { background-color: #fce7f3 !important; color: #be185d !important; border-color: #be185d !important; }
        .type-btn.active.income { background-color: #e8f5e9 !important; color: #2e7d32 !important; border-color: #2e7d32 !important; }
        .type-btn.active.expense { background-color: #ffebee !important; color: #c62828 !important; border-color: #c62828 !important; }
        
        /* 카드별 요약 세부 구조 */
        .card-grid { display: flex; flex-direction: column; gap: 8px; }
        .card-row-container { background-color: rgba(255, 255, 255, 0.08); border-radius: 8px; overflow: hidden; border: 1px solid rgba(255,255,255,0.1); }
        
        /* 클릭 가능한 카드 박스 */
        .card-box { width: 100%; border: none; background: transparent; padding: 12px; display: flex; justify-content: space-between; align-items: center; font-size: 13px; color: white; cursor: pointer; text-align: left; font-family: inherit; box-sizing: border-box; }
        .card-box:hover { background-color: rgba(255, 255, 255, 0.05); }
        .card-name { color: #cbd5e1; font-weight: 500; }
        .card-val { font-weight: bold; color: #ffffff; }

        /* 카드 클릭 시 나타날 세부 리스트 컨테이너 */
        .card-detail-list { display: none; background-color: rgba(0, 0, 0, 0.2); padding: 5px 12px 10px 12px; border-top: 1px solid rgba(255,255,255,0.05); }
        .card-detail-item { display: flex; justify-content: space-between; font-size: 11px; padding: 6px 0; border-bottom: 1px solid rgba(255,255,255,0.05); color: #94a3b8; }
        .card-detail-item:last-child { border-bottom: none; }
        .detail-left { display: flex; gap: 8px; align-items: center; }
        .detail-user { font-weight: bold; font-size: 10px; padding: 1px 4px; border-radius: 3px; }
        .detail-user.husband { background-color: rgba(14, 165, 233, 0.2); color: #38bdf8; }
        .detail-user.wife { background-color: rgba(236, 72, 153, 0.2); color: #f472b6; }
        .detail-title { color: #e2e8f0; }
        .detail-amount { font-weight: bold; color: #f87171; }

        .input-row { display: flex; gap: 10px; margin-bottom: 12px; }
        input, select { padding: 12px; border: 1px solid #e2e8f0; border-radius: 8px; font-size: 15px; outline: none; background-color: #f8fafc; box-sizing: border-box; }
        input:focus, select:focus { border-color: #1e293b; background-color: #fff; }
        
        .input-row select { width: 35%; flex-shrink: 0; } 
        .input-row input { flex: 1; min-width: 0; } 
        
        .submit-btn { width: 100%; padding: 14px; background-color: #1e293b; color: white; border: none; border-radius: 8px; font-size: 16px; font-weight: bold; cursor: pointer; }
        .submit-btn:disabled { background-color: #64748b; cursor: not-allowed; }
        
        /* 리스트 내역 */
        .list-section { padding: 20px; flex: 1; }
        .list-title { font-size: 16px; font-weight: bold; color: #1e293b; margin-bottom: 15px; }
        .ledger-list { list-style: none; padding: 0; margin: 0; }
        .ledger-item { display: flex; justify-content: space-between; align-items: center; padding: 14px 10px; border-bottom: 1px solid #f1f5f9; cursor: pointer; border-radius: 6px; }
        .ledger-item:hover { background-color: #f8fafc; }
        .item-info { display: flex; align-items: center; gap: 12px; }
        
        .user-badge { padding: 4px 8px; border-radius: 6px; font-size: 12px; font-weight: bold; }
        .user-badge.husband { background-color: #e0f2fe; color: #0369a1; }
        .user-badge.wife { background-color: #fce7f3; color: #be185d; }
        .card-badge { font-size: 11px; background-color: #f1f5f9; color: #475569; padding: 3px 6px; border-radius: 4px; border: 1px solid #e2e8f0; }
        .date-text { font-size: 12px; color: #94a3b8; }
        
        .item-title { font-size: 15px; color: #334155; font-weight: 500; }
        .item-amount { font-size: 16px; font-weight: bold; }
        .item-amount.income { color: #2e7d32; }
        .item-amount.expense { color: #c62828; }
        
        /* 모달 팝업 */
        .modal-overlay { display: none; position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); justify-content: center; align-items: center; z-index: 100; }
        .modal-content { background: white; padding: 20px; border-radius: 16px; width: 85%; max-width: 380px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        .modal-title { font-size: 16px; font-weight: bold; margin-bottom: 15px; color: #1e293b; }
        .modal-buttons { display: flex; gap: 10px; margin-top: 15px; }
        .modal-btn { flex: 1; padding: 12px; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; font-size: 14px; }
        .modal-btn.save { background-color: #1e293b; color: white; }
        .modal-btn.delete { background-color: #ef4444; color: white; }
        .modal-btn.cancel { background-color: #e2e8f0; color: #475569; }
        .loading-text { text-align: center; color: #64748b; font-size: 14px; padding: 20px 0; }
    </style>
</head>
<body>

<div class="app-container">
    <div class="header">
        <h1>쑥잠이네 가계부</h1>
        <a href="https://docs.google.com/spreadsheets/d/1AN2YYoW63gLwkXVi_jpmuMjkrboNkOv5PPoKM0UVfjI/edit?gid=894136498#gid=894136498" target="_blank" class="sheet-btn" style="margin-bottom: 10px;">구글 시트 바로가기</a>
        
        <button id="card-toggle-btn" onclick="toggleCardSection()" class="sheet-btn" style="width: 100%; border: none; cursor: pointer; font-family: inherit; margin-bottom: 10px;">💳 이번 달 카드별 지출 보기 ▾</button>
        <div id="card-section-wrapper" style="display: none; margin-bottom: 15px; background: rgba(255,255,255,0.05); padding: 10px; border-radius: 10px; border: 1px solid rgba(255,255,255,0.1);">
            <div class="card-grid" id="card-summary-grid">
                </div>
        </div>

        <div class="balance-box">
            <div class="label" id="balance-label">이번 달 정산 잔액</div>
            <div class="amount" id="db-balance">0 원</div>
        </div>
        <div class="summary-row">
            <div class="summary-item income">
                <div class="title">이번 달 수입</div>
                <div class="val" id="db-income">+ 0원</div>
            </div>
            <div class="summary-item expense">
                <div class="title">이번 달 지출</div>
                <div class="val" id="db-expense">- 0원</div>
            </div>
        </div>
    </div>
    
    <div class="input-section">
        <div class="type-selector">
            <div class="type-btn husband active" id="btn-user-husband" onclick="changeUser('남편')">남편</div>
            <div class="type-btn wife" id="btn-user-wife" onclick="changeUser('아내')">아내</div>
        </div>

        <div class="type-selector">
            <div class="type-btn income" id="btn-inc" onclick="selectType('income')">수입</div>
            <div class="type-btn expense active" id="btn-exp" onclick="selectType('expense')">지출</div>
        </div>
        
        <div class="input-row">
            <input type="date" id="date" style="width: 100%;">
        </div>
        
        <div class="input-row">
            <input type="number" id="amount" placeholder="금액 입력 (원)">
            <select id="card">
                <option value="선택안함">카드 선택</option>
                <option value="현대카드">현대카드</option>
                <option value="bc카드">bc카드</option>
                <option value="국민카드">국민카드</option>
                <option value="신한카드">신한카드</option>
                <option value="삼성카드">삼성카드</option>
                <option value="롯데카드">롯데카드</option>
                <option value="NH카드">NH카드</option>
                <option value="현금/계좌">현금/계좌</option>
            </select>
        </div>

        <div class="input-row">
            <input type="text" id="title" placeholder="사용 내역을 입력하세요 (예: 마트 장보기, 배달음식, 월급)">
        </div>

        <button class="submit-btn" onclick="addItem()">가계부 등록하기</button>
    </div>

    <div class="list-section">
        <div class="list-title">전체 입출금 내역 (클릭 시 수정/삭제)</div>
        <ul class="ledger-list" id="ledger-list">
            <div class="loading-text" id="loading-msg">최신 데이터를 불러오는 중...</div>
        </ul>
    </div>

    <div class="modal-overlay" id="edit-modal">
        <div class="modal-content">
            <div class="modal-title">내역 수정 / 삭제</div>
            
            <div class="type-selector">
                <div class="type-btn husband" id="modal-user-husband" onclick="changeModalUser('남편')">남편</div>
                <div class="type-btn wife" id="modal-user-wife" onclick="changeModalUser('아내')">아내</div>
            </div>

            <div class="type-selector">
                <div class="type-btn income" id="modal-inc" onclick="selectModalType('income')">수입</div>
                <div class="type-btn expense" id="modal-exp" onclick="selectModalType('expense')">지출</div>
            </div>

            <div class="input-row" style="margin-top:12px;">
                <input type="date" id="modal-date" style="width:100%;">
            </div>

            <div class="input-row">
                <input type="number" id="modal-amount">
                <select id="modal-card">
                    <option value="선택안함">카드 선택</option>
                    <option value="현대카드">현대카드</option>
                    <option value="bc카드">bc카드</option>
                    <option value="국민카드">국민카드</option>
                    <option value="신한카드">신한카드</option>
                    <option value="삼성카드">삼성카드</option>
                    <option value="롯데카드">롯데카드</option>
                    <option value="NH카드">NH카드</option>
                    <option value="현금/계좌">현금/계좌</option>
                </select>
            </div>

            <div class="input-row">
                <input type="text" id="modal-title">
            </div>

            <div class="modal-buttons">
                <button class="modal-btn delete" onclick="deleteItem()">삭제</button>
                <button class="modal-btn cancel" onclick="closeModal()">취소</button>
                <button class="modal-btn save" id="save-btn" onclick="updateItem()">수정완료</button>
            </div>
        </div>
    </div>
</div>

<script>
    const googleWebAppsUrl = "https://script.google.com/macros/s/AKfycbxhSd3uYZf0ItA9yZoj5XJyt1pJwcbxF1WNeh3QGn_GJm3u91WCAfnoDAwkziQ4P5z9/exec"; 

    let ledgerItems = [];
    let selectedUser = '남편';
    let selectedType = 'expense'; 
    let currentEditingId = null; 
    let modalSelectedUser = '남편';
    let modalSelectedType = 'expense';

    function setTodayDate() {
        const tzOffset = new Date().getTimezoneOffset() * 60000;
        const localISOTime = (new Date(Date.now() - tzOffset)).toISOString().slice(0, 10);
        document.getElementById('date').value = localISOTime;
    }

    function toggleCardSection() {
        const wrapper = document.getElementById('card-section-wrapper');
        const btn = document.getElementById('card-toggle-btn');
        
        const tzOffset = new Date().getTimezoneOffset() * 60000;
        const currentMonthNum = (new Date(Date.now() - tzOffset)).toISOString().substring(5, 7);

        if (wrapper.style.display === 'none' || wrapper.style.display === '') {
            wrapper.style.display = 'block';
            btn.innerText = `💳 ${currentMonthNum}월 카드별 지출 접기 ▴`;
        } else {
            wrapper.style.display = 'none';
            btn.innerText = `💳 ${currentMonthNum}월 카드별 지출 보기 ▾`;
        }
    }

    // 💳 [수정] 카드별 디테일창 토글 및 클릭 시 화면 자동 스크롤
    function toggleCardDetail(cardIdStr) {
        const detailBox = document.getElementById(`detail-${cardIdStr}`);
        if(!detailBox) return;

        if (detailBox.style.display === 'none' || detailBox.style.display === '') {
            detailBox.style.display = 'block';
            // 화면 상단으로 이동
            setTimeout(() => {
                detailBox.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
            }, 100);
        } else {
            detailBox.style.display = 'none';
        }
    }

    function changeUser(user) {
        selectedUser = user;
        document.getElementById('btn-user-husband').classList.toggle('active', user === '남편');
        document.getElementById('btn-user-wife').classList.toggle('active', user === '아내');
    }

    function selectType(type) {
        selectedType = type;
        document.getElementById('btn-inc').classList.toggle('active', type === 'income');
        document.getElementById('btn-exp').classList.toggle('active', type === 'expense');
        
        const cardSelect = document.getElementById('card');
        if (type === 'income') {
            cardSelect.value = '선택안함';
            cardSelect.disabled = true;
        } else {
            cardSelect.disabled = false;
        }
    }

    function changeModalUser(user) {
        modalSelectedUser = user;
        document.getElementById('modal-user-husband').classList.toggle('active', user === '남편');
        document.getElementById('modal-user-wife').classList.toggle('active', user === '아내');
    }

    function selectModalType(type) {
        modalSelectedType = type;
        document.getElementById('modal-inc').classList.toggle('active', type === 'income');
        document.getElementById('modal-exp').classList.toggle('active', type === 'expense');
        
        const mCardSelect = document.getElementById('modal-card');
        if (type === 'income') {
            mCardSelect.value = '선택안함';
            mCardSelect.disabled = true;
        } else {
            mCardSelect.disabled = false;
        }
    }

    function loadCloudData() {
        fetch(googleWebAppsUrl)
        .then(response => response.json())
        .then(data => {
            if (data.error) { alert("데이터 로드 실패: " + data.error); return; }
            ledgerItems = data;
            renderApp();
        })
        .catch(error => {
            console.error('Error:', error);
            document.getElementById('loading-msg').innerText = "데이터 로딩 오류 발생. 브라우저 강력 새로고침(Ctrl+F5)을 해주세요.";
        });
    }

    function addItem() {
        const date = document.getElementById('date').value;
        const card = document.getElementById('card').value;
        const title = document.getElementById('title').value;
        const amount = document.getElementById('amount').value;

        if (!date || !title || !amount) { alert('날짜, 금액, 내역을 모두 입력해주세요!'); return; }
        const uniqueId = Date.now(); 

        const sendData = {
            action: 'add',
            id: uniqueId,
            date: date,
            type: selectedType === 'income' ? '수입' : '지출',
            user: selectedUser,
            title: title,
            amount: parseInt(amount),
            card: card
        };

        const submitBtn = document.querySelector('.submit-btn');
        submitBtn.innerText = "구글 시트에 실시간 기록 중...";
        submitBtn.disabled = true;

        fetch(googleWebAppsUrl, {
            method: 'POST',
            body: JSON.stringify(sendData)
        })
        .then(response => response.json())
        .then(result => {
            if(result.result === "success" || result.action === "add") {
                ledgerItems.push({
                    id: uniqueId,
                    date: date,
                    type: selectedType,
                    user: selectedUser,
                    title: title,
                    amount: parseInt(amount),
                    card: card
                });
                document.getElementById('title').value = '';
                document.getElementById('amount').value = '';
                document.getElementById('card').value = '선택안함';
                setTodayDate();
                renderApp();
                alert("구글 스프레드시트 월별 시트에 안전하게 기록되었습니다!");
            } else { alert("저장 실패: " + result.error); }
        })
        .catch(error => { alert("통신 연결 실패! 인터넷 및 웹앱 배포 상태를 점검해주세요."); })
        .finally(() => {
            submitBtn.innerText = "가계부 등록하기";
            submitBtn.disabled = false;
        });
    }

    function openModal(id) {
        currentEditingId = id;
        const item = ledgerItems.find(i => i.id === id);
        if(!item) return;
        
        document.getElementById('modal-date').value = item.date;
        document.getElementById('modal-title').value = item.title;
        document.getElementById('modal-amount').value = item.amount;
        changeModalUser(item.user);
        selectModalType(item.type);
        document.getElementById('modal-card').value = item.card || '선택안함';

        document.getElementById('edit-modal').style.display = 'flex';
    }

    function closeModal() {
        document.getElementById('edit-modal').style.display = 'none';
        currentEditingId = null;
    }

    function updateItem() {
        const uDate = document.getElementById('modal-date').value;
        const uCard = document.getElementById('modal-card').value;
        const uTitle = document.getElementById('modal-title').value;
        const uAmount = document.getElementById('modal-amount').value;

        if (!uDate || !uTitle || !uAmount) { alert('날짜, 금액, 내역을 모두 입력해주세요!'); return; }

        const sendData = {
            action: 'update',
            id: currentEditingId, 
            date: uDate,
            type: modalSelectedType === 'income' ? '수입' : '지출',
            user: modalSelectedUser,
            title: uTitle,
            amount: parseInt(uAmount),
            card: uCard
        };

        const saveBtn = document.getElementById('save-btn');
        saveBtn.innerText = "시트 고치는 중...";
        saveBtn.disabled = true;

        fetch(googleWebAppsUrl, {
            method: 'POST',
            body: JSON.stringify(sendData)
        })
        .then(response => response.json())
        .then(result => {
            if(result.result === "success" || result.action === "update") {
                const item = ledgerItems.find(i => i.id === currentEditingId);
                if(item) {
                    item.date = uDate;
                    item.user = modalSelectedUser;
                    item.title = uTitle;
                    item.amount = parseInt(uAmount);
                    item.type = modalSelectedType;
                    item.card = uCard;
                }
                closeModal();
                renderApp();
                alert("구글 시트 내역(및 월별 위치)이 안전하게 수정되었습니다!");
            } else { alert("수정 실패!"); }
        })
        .catch(error => { alert("통신 오류로 인해 수정 처리가 되지 않았습니다."); })
        .finally(() => {
            saveBtn.innerText = "수정완료";
            saveBtn.disabled = false;
        });
    }

    function deleteItem() {
        if (!confirm("정말 이 내역을 삭제하시겠습니까? 구글 시트에서도 완벽히 제거됩니다.")) return;

        const sendData = { action: 'delete', id: currentEditingId };
        const deleteBtn = document.querySelector('.modal-btn.delete');
        deleteBtn.innerText = "삭제 중...";
        deleteBtn.disabled = true;

        fetch(googleWebAppsUrl, {
            method: 'POST',
            body: JSON.stringify(sendData)
        })
        .then(response => response.json())
        .then(result => {
            if(result.result === "success" || result.action === "delete") {
                ledgerItems = ledgerItems.filter(i => i.id !== currentEditingId);
                closeModal();
                renderApp();
                alert("내역이 영구적으로 삭제되었습니다.");
            } else { alert("삭제 실패!"); }
        })
        .catch(error => { alert("통신 오류로 인해 삭제에 실패했습니다."); })
        .finally(() => {
            deleteBtn.innerText = "삭제";
            deleteBtn.disabled = false;
        });
    }

    function renderApp() {
        const listElement = document.getElementById('ledger-list');
        listElement.innerHTML = '';

        if (ledgerItems.length === 0) {
            listElement.innerHTML = '<div class="loading-text">기록된 가계부 내역이 없습니다. 첫 지출/수입을 등록해 보세요!</div>';
            document.getElementById('db-balance').innerText = "0 원";
            document.getElementById('db-income').innerText = "+ 0원";
            document.getElementById('db-expense').innerText = "- 0원";
            document.getElementById('card-summary-grid').innerHTML = '';
            return;
        }

        let totalIncome = 0;
        let totalExpense = 0;
        
        let cardTotals = {};
        let cardDetailsMap = {};
        
        const tzOffset = new Date().getTimezoneOffset() * 60000;
        const currentMonthStr = (new Date(Date.now() - tzOffset)).toISOString().substring(0, 7);
        
        const currentMonthNum = currentMonthStr.split('-')[1];
        document.getElementById('balance-label').innerText = `${currentMonthNum}월 정산 잔액`;

        const wrapper = document.getElementById('card-section-wrapper');
        const cardToggleBtn = document.getElementById('card-toggle-btn');
        const isExpanded = (wrapper.style.display === 'block');
        cardToggleBtn.innerText = isExpanded ? `💳 ${currentMonthNum}월 카드별 지출 접기 ▴` : `💳 ${currentMonthNum}월 카드별 지출 보기 ▾`;

        const displayItems = [...ledgerItems].sort((a,b) => new Date(b.date) - new Date(a.date) || b.id - a.id); 

        displayItems.forEach(item => {
            if (item.date && item.date.startsWith(currentMonthStr)) {
                if (item.type === 'income') { 
                    totalIncome += item.amount; 
                } else { 
                    totalExpense += item.amount; 
                    
                    let cardKey = item.card;
                    if (!cardKey || cardKey === '선택안함') {
                        cardKey = '현금/계좌';
                    }
                    cardTotals[cardKey] = (cardTotals[cardKey] || 0) + item.amount;
                    
                    if(!cardDetailsMap[cardKey]) cardDetailsMap[cardKey] = [];
                    cardDetailsMap[cardKey].push(item);
                }
            }

            const li = document.createElement('li');
            li.className = 'ledger-item';
            li.onclick = () => openModal(item.id);

            if (item.user === '남편') {
                li.style.backgroundColor = 'rgba(224, 242, 254, 0.5)'; 
            } else if (item.user === '아내') {
                li.style.backgroundColor = 'rgba(252, 231, 243, 0.5)'; 
            }

            const sign = item.type === 'income' ? '+ ' : '- ';
            const amountClass = item.type === 'income' ? 'income' : 'expense';
            
            const cardText = (item.card && item.card !== '선택안함') ? item.card : (item.type === 'income' ? '수입' : '현금');
            const formattedDate = item.date ? item.date.substring(5) : '';

            li.innerHTML = `
                <div class="item-info">
                    <span class="card-badge">${cardText}</span>
                    <span class="date-text">${formattedDate}</span>
                    <span class="item-title">${item.title}</span>
                </div>
                <div class="item-amount ${amountClass}">${sign}${item.amount.toLocaleString()}원</div>
            `;
            listElement.appendChild(li);
        });

        // 💳 [수정] 카드별 요약 렌더링 (화살표 ▾ 삭제)
        const cardGrid = document.getElementById('card-summary-grid');
        cardGrid.innerHTML = '';
        
        const activeCards = Object.keys(cardTotals).filter(key => cardTotals[key] > 0);
        
        if (activeCards.length === 0) {
            cardGrid.innerHTML = '<div style="text-align: center; color: #cbd5e1; font-size: 13px; padding: 10px 0;">이번 달 카드 지출 내역이 없습니다.</div>';
        } else {
            activeCards.forEach((card, idx) => {
                const cardIdStr = `card-idx-${idx}`;
                
                const container = document.createElement('div');
                container.className = 'card-row-container';
                
                const boxBtn = document.createElement('button');
                boxBtn.className = 'box-btn card-box';
                boxBtn.onclick = () => toggleCardDetail(cardIdStr);
                // 화살표 삭제
                boxBtn.innerHTML = `
                    <span class="card-name">${card}</span>
                    <span class="card-val">${cardTotals[card].toLocaleString()}원</span>
                `;
                
                const detailList = document.createElement('div');
                detailList.className = 'card-detail-list';
                detailList.id = `detail-${cardIdStr}`;
                
                let detailsHtml = '';
                if(cardDetailsMap[card]) {
                    const sortedDetails = [...cardDetailsMap[card]].sort((a,b) => new Date(a.date) - new Date(b.date));
                    sortedDetails.forEach(det => {
                        const userClass = det.user === '남편' ? 'husband' : 'wife';
                        const mDate = det.date ? det.date.substring(8, 10) : ''; 
                        detailsHtml += `
                            <div class="card-detail-item">
                                <div class="detail-left">
                                    <span class="detail-user ${userClass}">${det.user}</span>
                                    <span style="color:#64748b;">${mDate}일</span>
                                    <span class="detail-title">${det.title}</span>
                                </div>
                                <div class="detail-amount">${det.amount.toLocaleString()}원</div>
                            </div>
                        `;
                    });
                }
                detailList.innerHTML = detailsHtml;
                
                container.appendChild(boxBtn);
                container.appendChild(detailList);
                cardGrid.appendChild(container);
            });
        }

        const balance = totalIncome - totalExpense;
        document.getElementById('db-balance').innerText = `${balance.toLocaleString()} 원`;
        document.getElementById('db-income').innerText = `+ ${totalIncome.toLocaleString()}원`;
        document.getElementById('db-expense').innerText = `- ${totalExpense.toLocaleString()}원`;
    }

    setTodayDate();
    loadCloudData();
</script>
